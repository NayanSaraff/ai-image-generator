[theme]
primaryColor         = "#7C3AED"   # Violet accent
backgroundColor      = "#0F0F1A"   # Deep dark background
secondaryBackgroundColor = "#1A1A2E"
textColor            = "#E2E8F0"
font                 = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
